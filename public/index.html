<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAXON — Catálogo</title>
    <meta name="description" content="VAXON Bolivia — Catálogo exclusivo de productos. Explora nuestra colección premium.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a84c',
                        'gold-light': '#d4b95e',
                        'gold-dim': '#8a7535',
                        dark: { 100: '#1a1a1a', 200: '#131313', 300: '#111111', 400: '#0a0a0a' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-dark-400 text-gray-100 custom-scrollbar overflow-x-hidden">

    <div id="notification-container"></div>

    <div id="loading-overlay" class="fixed inset-0 bg-dark-400 z-[100] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-[3px] border-gold border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-6 font-light tracking-[0.4em] uppercase text-[10px] text-gold-dim">Vaxon</p>
        </div>
    </div>

    <div id="app-content">
        <header class="sticky top-0 z-40 glass border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 h-24 flex justify-between items-center">
                
                <div class="flex items-center gap-4 cursor-pointer" onclick="navigate('home')">
                    <div class="w-12 h-12 bg-gradient-to-br from-gold to-gold-light flex items-center justify-center text-black rotate-45 hover:rotate-0 transition-transform duration-500 shadow-lg shadow-gold/20 rounded-xl">
                        <span class="font-black text-xl -rotate-45 hover:rotate-0 transition-transform duration-500">V</span>
                    </div>
                    <div class="flex flex-col leading-[1.1]">
                        <span class="text-xl font-extrabold uppercase tracking-tighter text-white">VAXON</span>
                        <span class="text-[10px] font-bold uppercase tracking-[0.3em] text-gold-dim">Catálogo</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-4">
                    <div class="relative hidden lg:block">
                        <input type="text" id="search-desktop" oninput="handleSearch(this.value)" placeholder="Buscar productos..." 
                            class="pl-4 pr-10 py-2.5 bg-dark-100 border border-white/5 rounded-xl text-xs w-64 focus:border-gold-dim/50 outline-none transition-all font-bold uppercase text-gray-300 placeholder-gray-600">
                        <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-gold-dim/50 text-xs"></i>
                    </div>

                    <button onclick="toggleMobileSearch()" class="search-mobile-toggle" id="search-mobile-btn">
                        <i class="fa-solid fa-magnifying-glass text-sm"></i>
                    </button>
                    
                    <button onclick="toggleCart(true)" class="flex items-center gap-3 group">
                        <div class="flex flex-col items-end">
                            <span class="text-[9px] font-black uppercase tracking-widest text-gray-500">Tu Bolsa</span>
                            <span id="header-cart-total" class="text-xs font-black text-gold">BS 0.00</span>
                        </div>
                        <div class="relative p-3 bg-gradient-to-br from-gold to-gold-light text-black rounded-full group-hover:scale-110 transition-transform shadow-xl shadow-gold/20">
                            <i class="fa-solid fa-bag-shopping text-sm"></i>
                            <span id="cart-count" class="absolute -top-1 -right-1 bg-dark-400 text-gold text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-gold hidden">0</span>
                        </div>
                    </button>
                </div>
            </div>
        </header>

        <!-- Mobile Search Bar -->
        <div id="search-bar-mobile" class="search-bar-mobile">
            <input type="text" id="search-mobile-input" oninput="handleSearch(this.value)" placeholder="Buscar productos...">
        </div>

        <main id="main-view" class="min-h-[70vh] animate-fade">
        </main>

        <footer class="border-t border-white/5 py-20 mt-20">
            <div class="max-w-7xl mx-auto px-6 text-center">
                <h3 class="text-[11px] font-black mb-2 tracking-[0.5em] uppercase text-gold">Vaxon Bolivia</h3>
                <p class="text-gray-600 text-[10px] font-light uppercase tracking-widest">Catálogo Boutique Pro • 2026</p>
                <div class="flex justify-center gap-8 mt-10 text-gray-600">
                    <i class="fa-brands fa-instagram text-lg hover:text-gold cursor-pointer transition-colors"></i>
                    <i class="fa-brands fa-facebook text-lg hover:text-gold cursor-pointer transition-colors"></i>
                    <i class="fa-brands fa-tiktok text-lg hover:text-gold cursor-pointer transition-colors"></i>
                    <i class="fa-brands fa-whatsapp text-lg hover:text-green-500 cursor-pointer transition-colors"></i>
                </div>
            </div>
        </footer>
    </div>

    <div id="cart-sidebar" class="fixed inset-0 z-[60] invisible opacity-0 transition-all duration-500 overflow-hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleCart(false)"></div>
        
        <div id="cart-content" class="absolute right-0 top-0 h-full w-full max-w-sm bg-dark-300 shadow-2xl translate-x-full transition-transform duration-500 flex flex-col border-l border-white/5">
            <div class="p-8 border-b border-white/5 flex justify-between items-center">
                <div class="flex flex-col">
                    <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-gold">Mi Bolsa</h2>
                    <span class="text-[8px] font-bold text-gray-600 uppercase tracking-widest mt-1">Confirmación de pedido</span>
                </div>
                <button onclick="toggleCart(false)" class="text-gray-500 hover:text-gold text-3xl transition-colors">&times;</button>
            </div>

            <div id="cart-items-list" class="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar">
            </div>

            <div class="p-8 border-t border-white/5 shadow-[0_-20px_40px_-15px_rgba(0,0,0,0.3)]">
                <div class="flex justify-between items-end mb-8">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-500">Resumen Total</span>
                        <span id="cart-total" class="text-3xl font-black tracking-tighter text-gold">BS 0.00</span>
                    </div>
                </div>
                
                <button type="button" onclick="checkout(event)" class="w-full btn-gold py-5 rounded-2xl text-[11px] tracking-[0.3em] flex items-center justify-center gap-3 active:scale-95">
                    Confirmar Pedido <i class="fa-brands fa-whatsapp text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
