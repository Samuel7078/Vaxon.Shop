<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emma Store | Boutique Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white text-black custom-scrollbar overflow-x-hidden">

    <div id="notification-container"></div>

    <div id="loading-overlay" class="fixed inset-0 bg-white z-[100] flex items-center justify-center">
        <div class="flex flex-col items-center">
            <div class="w-10 h-10 border-[3px] border-black border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-6 font-light tracking-[0.4em] uppercase text-[10px]">Emma Store</p>
        </div>
    </div>

    <div id="app-content">
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-gray-50">
            <div class="max-w-7xl mx-auto px-6 h-32 flex justify-between items-center">
                
                <div class="flex items-center gap-4 cursor-pointer" onclick="navigate('home')">
                    <div class="w-14 h-14 bg-black flex items-center justify-center text-white rotate-45 hover:rotate-0 transition-transform duration-500 shadow-lg shadow-gray-200">
                        <span class="font-black text-2xl -rotate-45 hover:rotate-0 transition-transform duration-500">E</span>
                    </div>
                    <div class="flex flex-col leading-[1.1]">
                        <span class="text-2xl font-extrabold uppercase tracking-tighter text-black">EMMA</span>
                        <span class="text-xl font-light uppercase tracking-[0.2em] text-black">Store</span>
                        <span class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-40 mt-1">Bolivia</span>
                    </div>
                </div>
                
                <div class="flex items-center gap-8">
                    <div class="relative hidden lg:block">
                        <input type="text" oninput="handleSearch(this.value)" placeholder="Buscar en la tienda..." 
                            class="pl-4 pr-10 py-2.5 bg-gray-50 border border-transparent rounded-lg text-xs w-64 focus:bg-white focus:border-gray-200 outline-none transition-all font-bold uppercase">
                        <i class="fa-solid fa-magnifying-glass absolute right-4 top-1/2 -translate-y-1/2 text-gray-300 text-xs"></i>
                    </div>
                    
                    <button onclick="toggleCart(true)" class="flex items-center gap-4 group">
                        <div class="flex flex-col items-end">
                            <span class="text-[9px] font-black uppercase tracking-widest text-gray-400">Tu Bolsa</span>
                            <span id="header-cart-total" class="text-xs font-black">BS 0.00</span>
                        </div>
                        <div class="relative p-3 bg-black text-white rounded-full group-hover:scale-110 transition-transform shadow-xl">
                            <i class="fa-solid fa-bag-shopping text-sm"></i>
                            <span id="cart-count" class="absolute -top-1 -right-1 bg-white text-black text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-black hidden">0</span>
                        </div>
                    </button>
                </div>
            </div>
        </header>

        <main id="main-view" class="min-h-[70vh] animate-fade">
        </main>

        <footer class="bg-white border-t border-gray-100 py-20 mt-20">
            <div class="max-w-7xl mx-auto px-6 text-center">
                <h3 class="text-[11px] font-black mb-2 tracking-[0.5em] uppercase text-black">Emma Store Bolivia</h3>
                <p class="text-gray-400 text-[10px] font-light uppercase tracking-widest">Catálogo Boutique Pro • 2026</p>
                <div class="flex justify-center gap-8 mt-10 text-gray-400">
                    <i class="fa-brands fa-instagram text-lg hover:text-black cursor-pointer transition-colors"></i>
                    <i class="fa-brands fa-facebook text-lg hover:text-black cursor-pointer transition-colors"></i>
                    <i class="fa-brands fa-tiktok text-lg hover:text-black cursor-pointer transition-colors"></i>
                    <i class="fa-brands fa-whatsapp text-lg hover:text-green-500 cursor-pointer transition-colors"></i>
                </div>
            </div>
        </footer>
    </div>

    <div id="cart-sidebar" class="fixed inset-0 z-[60] invisible opacity-0 transition-all duration-500 overflow-hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="toggleCart(false)"></div>
        
        <div id="cart-content" class="absolute right-0 top-0 h-full w-full max-w-sm bg-white shadow-2xl translate-x-full transition-transform duration-500 flex flex-col">
            <div class="p-8 border-b flex justify-between items-center bg-white">
                <div class="flex flex-col">
                    <h2 class="text-[11px] font-black uppercase tracking-[0.4em] text-black">Mi Bolsa</h2>
                    <span class="text-[8px] font-bold opacity-30 uppercase tracking-widest mt-1">Confirmación de pedido</span>
                </div>
                <button onclick="toggleCart(false)" class="text-gray-300 hover:text-black text-3xl transition-colors">&times;</button>
            </div>

            <div id="cart-items-list" class="flex-1 overflow-y-auto p-8 space-y-4 no-scrollbar bg-gray-50/20">
                </div>

            <div class="p-8 border-t border-gray-100 bg-white shadow-[0_-20px_40px_-15px_rgba(0,0,0,0.05)]">
                <div class="flex justify-between items-end mb-8">
                    <div class="flex flex-col">
                        <span class="text-[10px] font-black uppercase tracking-widest text-gray-300">Resumen Total</span>
                        <span id="cart-total" class="text-3xl font-black tracking-tighter text-black">BS 0.00</span>
                    </div>
                </div>
                
                <button type="button" onclick="checkout(event)" class="w-full bg-black text-white py-6 rounded-2xl font-black text-[11px] tracking-[0.3em] uppercase hover:bg-gray-900 transition-all flex items-center justify-center gap-3 shadow-2xl active:scale-95">
                    Confirmar Pedido <i class="fa-brands fa-whatsapp text-lg"></i>
                </button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
