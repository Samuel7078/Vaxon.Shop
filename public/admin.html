<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaxon Admin | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#c9a84c',
                        'gold-light': '#d4b95e',
                        'gold-dim': '#8a7535',
                        dark: { 100: '#1a1a1a', 200: '#131313', 300: '#111111', 400: '#0a0a0a' }
                    }
                }
            }
        }
    </script>
    <style>
        #admin-sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #admin-main-container { transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-dark-400 font-sans overflow-x-hidden text-gray-200">

    <div id="admin-login" class="fixed inset-0 bg-dark-400 z-[200] flex items-center justify-center">
        <div class="bg-dark-300 p-12 rounded-[3.5rem] w-full max-w-sm text-center shadow-2xl animate-fade border border-white/5">
            <div class="w-16 h-16 bg-gradient-to-br from-gold to-gold-light text-black rounded-2xl flex items-center justify-center mx-auto mb-8 rotate-12 shadow-lg shadow-gold/20">
                <i class="fa-solid fa-shield-halved text-2xl"></i>
            </div>
            <h2 class="text-xl font-black uppercase tracking-tighter mb-2 text-white">Panel de Control</h2>
            <p class="text-[10px] text-gold-dim uppercase font-bold tracking-widest mb-8">VAXON — Gestión de Acceso</p>
            
            <div class="relative mb-6">
                <input type="password" id="admin-pass" placeholder="Contraseña Maestra" 
                    class="w-full p-5 bg-dark-100 rounded-2xl outline-none border-2 border-transparent focus:border-gold-dim transition-all text-center font-bold text-gray-200 placeholder-gray-600">
            </div>

            <div class="flex items-center gap-3 mb-8 justify-center">
                <input type="checkbox" id="remember-me" class="w-4 h-4 accent-gold cursor-pointer">
                <label for="remember-me" class="text-[9px] font-black uppercase text-gray-500 cursor-pointer select-none tracking-widest">Mantener sesión iniciada</label>
            </div>
            
            <button onclick="checkAdminLogin()" 
                class="w-full btn-gold py-5 rounded-2xl text-[10px] tracking-[0.2em] active:scale-95 transition-all">
                Verificar Identidad
            </button>
        </div>
    </div>

    <div id="admin-content" class="hidden min-h-screen flex flex-col lg:flex-row">
        
        <button id="nav-toggle-btn" onclick="toggleNav()" 
            class="fixed top-6 left-6 z-[100] w-12 h-12 bg-gradient-to-br from-gold to-gold-light text-black rounded-2xl shadow-2xl shadow-gold/20 flex items-center justify-center hover:scale-110 active:scale-90 transition-all">
            <i class="fa-solid fa-bars"></i>
        </button>

        <aside id="admin-sidebar" class="fixed inset-y-0 left-0 w-72 bg-dark-300 text-white p-10 flex flex-col z-[90] shadow-2xl border-r border-white/5">
            <div class="mb-16 mt-12 lg:mt-0">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-gradient-to-br from-gold to-gold-light text-black flex items-center justify-center font-black rounded-lg shadow-lg shadow-gold/20">V</div>
                    <div>
                        <h1 class="text-lg font-black uppercase tracking-tighter leading-none">VAXON <span class="font-light text-gray-500">ADMIN</span></h1>
                        <p class="text-[8px] font-bold text-gold-dim tracking-[0.3em] mt-1">DASHBOARD PROFESIONAL</p>
                    </div>
                </div>
            </div>

            <nav class="flex-1 space-y-2 overflow-y-auto no-scrollbar">
                <button onclick="setAdminView('products')" class="admin-nav-item w-full flex items-center gap-4 py-4 px-6 rounded-2xl transition-all group">
                    <i class="fa-solid fa-box text-xs group-hover:scale-125 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Artículos</span>
                </button>
                
                <button onclick="setAdminView('categories')" class="admin-nav-item w-full flex items-center gap-4 py-4 px-6 rounded-2xl transition-all opacity-40 hover:opacity-100 group">
                    <i class="fa-solid fa-tags text-xs group-hover:scale-125 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Categorías</span>
                </button>
                
                <button onclick="setAdminView('stories')" class="admin-nav-item w-full flex items-center gap-4 py-4 px-6 rounded-2xl transition-all opacity-40 hover:opacity-100 group">
                    <i class="fa-solid fa-bolt text-xs group-hover:scale-125 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Stories</span>
                </button>
                
                <button onclick="setAdminView('team')" class="admin-nav-item w-full flex items-center gap-4 py-4 px-6 rounded-2xl transition-all opacity-40 hover:opacity-100 group">
                    <i class="fa-solid fa-users text-xs group-hover:scale-125 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Equipo</span>
                </button>
                
                <button onclick="setAdminView('logs')" class="admin-nav-item w-full flex items-center gap-4 py-4 px-6 rounded-2xl transition-all opacity-40 hover:opacity-100 group">
                    <i class="fa-solid fa-list-check text-xs group-hover:scale-125 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Historial</span>
                </button>

                <button onclick="setAdminView('settings')" class="admin-nav-item w-full flex items-center gap-4 py-4 px-6 rounded-2xl transition-all opacity-40 hover:opacity-100 group">
                    <i class="fa-solid fa-gear text-xs group-hover:scale-125 transition-transform"></i>
                    <span class="text-[10px] font-black uppercase tracking-widest">Ajustes</span>
                </button>
            </nav>

            <div class="pt-10 border-t border-white/10 mt-6">
                <button onclick="logoutAdmin()" class="flex items-center gap-4 text-red-400 hover:text-red-300 transition-colors group">
                    <i class="fa-solid fa-power-off text-xs group-hover:rotate-90 transition-transform duration-500"></i>
                    <span class="text-[9px] font-black uppercase tracking-widest">Cerrar Sesión</span>
                </button>
            </div>
        </aside>

        <main id="admin-main-container" class="flex-1 min-h-screen lg:ml-72 bg-dark-400 p-8 lg:p-16">
            <div id="admin-main" class="max-w-7xl mx-auto h-full">
                <div class="flex items-center justify-center h-[60vh]">
                    <div class="text-center opacity-40">
                        <i class="fa-solid fa-circle-notch animate-spin text-4xl mb-4 text-gold"></i>
                        <p class="text-[10px] font-black uppercase tracking-widest text-gray-500">Sincronizando con MySQL...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="admin-toast" class="fixed bottom-10 right-10 z-[300] hidden animate-bounce">
        <div class="bg-gradient-to-r from-gold to-gold-light text-black px-8 py-4 rounded-2xl shadow-2xl font-black text-[10px] uppercase tracking-widest">
            Sincronización Exitosa
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
